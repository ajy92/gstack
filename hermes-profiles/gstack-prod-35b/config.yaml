platforms:
  telegram:
    enabled: false


# Paperclip Hybrid System Integration
paperclip:
  shared_workspace: "~/.paperclip-shared/hybrid-system"
  sync_interval: "5m"
  sync_on_tool_completion: true
  vault_sync_strategy: "append-only"
  
  # Ollama Resource Management (avoid contention with OpenClaw)
  ollama_resource_sharing:
    mode: "sequential"
    worker_model: "qwen3.5:35b"
    priority_level: 5
    pause_on_ceo_task: true
    max_parallel_requests: 2    # 모델 분리(9b/35b)로 병렬 실행 가능
    queue_timeout: 1800

  # Communication protocols
  communication:
    protocol: "paperclip-jsonl"
    message_format: {source, target, task, prompt, timeout, callback}
    streaming: true
    streaming_interval: "30s"

  # Paperclip Adapter Configuration
  adapter:
    type: "hermes-local"
    execution_mode: "quiet"
    single_query_mode: true
